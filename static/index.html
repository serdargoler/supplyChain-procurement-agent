<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Assistant</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-elevated: #243044;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --text-muted: #8b9cb3;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --user-bubble: #2563eb;
      --ai-bubble: #243044;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --radius: 16px;
      --radius-sm: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(145deg, #0b1020 0%, #121826 50%, #0f1419 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .chat-app {
      width: 100%;
      max-width: 720px;
      height: min(88vh, 760px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .chat-header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .chat-header p {
      margin-top: 0.25rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.25s ease;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      padding: 0 0.25rem;
    }

    .message-bubble {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      line-height: 1.5;
      font-size: 0.9375rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .message-bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      align-self: flex-start;
      display: none;
      padding: 0.75rem 1rem;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      border-bottom-left-radius: 4px;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .typing-indicator.visible {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: fadeIn 0.25s ease;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .chat-input-area {
      padding: 1rem 1.25rem 1.25rem;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-elevated);
      color: var(--text);
      font: inherit;
      line-height: 1.4;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    #message-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    #send-button {
      flex-shrink: 0;
      height: 44px;
      padding: 0 1.25rem;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }

    #send-button:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    #send-button:active:not(:disabled) {
      transform: scale(0.97);
    }

    #send-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .welcome-message {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9375rem;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-4px);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 0;
      }

      .chat-app {
        height: 100vh;
        max-height: none;
        border-radius: 0;
        border: none;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <header class="chat-header">
      <h1>Inventory Assistant</h1>
      <p>Ask questions about stock, prices, and categories.</p>
    </header>

    <main id="chat-messages" class="chat-messages">
      <div class="welcome-message">
        Try asking: "Which items are in the Produce category?" or "What is the most expensive item?"
      </div>
    </main>

    <div id="typing-indicator" class="typing-indicator" aria-live="polite">
      <span>typing</span>
      <div class="typing-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <footer class="chat-input-area">
      <form id="chat-form" class="input-row">
        <textarea
          id="message-input"
          rows="1"
          placeholder="Type your question..."
          autocomplete="off"
          required
        ></textarea>
        <button type="submit" id="send-button">Send</button>
      </form>
    </footer>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/ask";

    const chatMessages = document.getElementById("chat-messages");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");
    const sendButton = document.getElementById("send-button");
    const typingIndicator = document.getElementById("typing-indicator");

    let welcomeRemoved = false;

    function removeWelcome() {
      if (!welcomeRemoved) {
        const welcome = chatMessages.querySelector(".welcome-message");
        if (welcome) welcome.remove();
        welcomeRemoved = true;
      }
    }

    function appendMessage(text, role) {
      removeWelcome();

      const message = document.createElement("div");
      message.className = `message ${role}`;

      const label = document.createElement("span");
      label.className = "message-label";
      label.textContent = role === "user" ? "You" : "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.textContent = text;

      message.appendChild(label);
      message.appendChild(bubble);
      chatMessages.appendChild(message);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function setTyping(visible) {
      typingIndicator.classList.toggle("visible", visible);
      if (visible) {
        chatMessages.appendChild(typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    }

    function setLoading(isLoading) {
      sendButton.disabled = isLoading;
      messageInput.disabled = isLoading;
      setTyping(isLoading);
    }

    async function sendMessage(question) {
      setLoading(true);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        const data = await response.json();

        if (!response.ok) {
          const errorDetail = data.detail || "Something went wrong. Please try again.";
          appendMessage(typeof errorDetail === "string" ? errorDetail : JSON.stringify(errorDetail), "assistant");
          return;
        }

        appendMessage(data.answer, "assistant");
      } catch (error) {
        appendMessage("Could not reach the server. Make sure the API is running on http://127.0.0.1:8000.", "assistant");
      } finally {
        setLoading(false);
        messageInput.focus();
      }
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const question = messageInput.value.trim();
      if (!question) return;

      appendMessage(question, "user");
      messageInput.value = "";
      messageInput.style.height = "auto";

      await sendMessage(question);
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    messageInput.addEventListener("input", () => {
      messageInput.style.height = "auto";
      messageInput.style.height = `${Math.min(messageInput.scrollHeight, 120)}px`;
    });
  </script>
</body>
</html>
